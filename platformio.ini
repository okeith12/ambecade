; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
; Uses the project's own ST7789 driver + gfx layer (Display/), not Adafruit.
build_unflags = -std=gnu++11
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -IDisplay/st7789
    -IDisplay/gfx
    -IDisplay/screen
    -IDisplay/storage
build_src_filter =
    +<*>
    +<../Display/st7789/st7789.c>
    +<../Display/st7789/spi_bus.c>
    +<../Display/storage/storage.c>
    +<../Display/gfx/bitmap.cpp>
    +<../Display/screen/procedural_face.cpp>
    +<../Display/screen/shapes_screen.cpp>
    +<../Display/screen/bitmap_face.cpp>
; [env:megaatmega2560]
; platform = atmelavr
; board = megaatmega2560
; framework = arduino
; lib_deps =
;     adafruit/Adafruit ST7735 and ST7789 Library
;     adafruit/Adafruit GFX Library
;     adafruit/Adafruit BusIO
[env:native]
platform = native
test_framework = unity
build_flags = -std=c11 -Wall -Wextra